<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Generador de iconos BIA</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 20px; text-align: center; }
  h2 { color: #22d3ee; }
  .buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; }
  button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<h2>⚡ Generador de Iconos BIA</h2>
<p>Vista previa:</p>
<canvas id="preview" width="200" height="200" style="border-radius:22%;display:block;margin:0 auto"></canvas>
<div class="buttons" style="margin-top:20px">
  <button type="button" onclick="dl(512,'icon-512.png')">⬇ icon-512.png</button>
  <button type="button" onclick="dl(192,'icon-192.png')">⬇ icon-192.png</button>
  <button type="button" onclick="dl(180,'apple-touch-icon.png')">⬇ apple-touch-icon.png</button>
  <button type="button" onclick="dl(72,'icon-72.png')">⬇ icon-72.png</button>
</div>
<canvas id="off" style="display:none"></canvas>
<script>
function draw(canvas, s) {
  const ctx = canvas.getContext('2d');
  canvas.width = s; canvas.height = s;
  const cx = s/2, cy = s/2;

  // Fondo morado con esquinas redondeadas
  const brad = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(brad,0); ctx.lineTo(s-brad,0);
  ctx.quadraticCurveTo(s,0,s,brad);
  ctx.lineTo(s,s-brad); ctx.quadraticCurveTo(s,s,s-brad,s);
  ctx.lineTo(brad,s); ctx.quadraticCurveTo(0,s,0,s-brad);
  ctx.lineTo(0,brad); ctx.quadraticCurveTo(0,0,brad,0);
  ctx.closePath();
  const bgGrad = ctx.createLinearGradient(0,0,s,s);
  bgGrad.addColorStop(0,'#6C5CE7');
  bgGrad.addColorStop(1,'#4834D4');
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Círculo oscuro central
  ctx.beginPath();
  ctx.arc(cx, cy, s*0.39, 0, Math.PI*2);
  ctx.fillStyle = '#0d1117';
  ctx.fill();

  // Rayo — path de Heroicons: M13 10V3L4 14h7v7l9-11h-7z (viewBox 0 0 24 24)
  const sc = s / 40;
  ctx.save();
  ctx.translate(cx - 12*sc, cy - 12*sc);
  ctx.scale(sc, sc);

  const bolt = new Path2D('M13 10V3L4 14h7v7l9-11h-7z');
  const rg = ctx.createLinearGradient(12, 3, 12, 21);
  rg.addColorStop(0, '#7DFFF5');
  rg.addColorStop(1, '#00D4C8');
  ctx.fillStyle = rg;
  ctx.fill(bolt);
  ctx.restore();
}

function dl(size, name) {
  const c = document.getElementById('off');
  draw(c, size);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}

draw(document.getElementById('preview'), 200);
</script>
</body>
</html>
